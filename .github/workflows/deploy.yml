name: Build & Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: |
          NODE_OPTIONS='--max-old-space-size=6144' \
          NEXT_TURBOPACK=0 \
          NEXT_TELEMETRY_DISABLED=1 \
          npx next build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST: "true"

      - name: Build OpenNext for Cloudflare
        run: |
          NEXT_TELEMETRY_DISABLED=1 npx @opennextjs/cloudflare build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST: "true"

      - name: Normalize worker filename and apply trustHost patch
        run: |
          # v1.19.11: worker.js / 旧版: bundled-worker.js
          # gsk hosted deploy は bundled-worker.js を期待するため統一
          if [ -f ".open-next/worker.js" ] && [ ! -f ".open-next/bundled-worker.js" ]; then
            cp .open-next/worker.js .open-next/bundled-worker.js
            echo "Copied worker.js -> bundled-worker.js"
          fi
          WORKER=".open-next/bundled-worker.js"
          echo "Worker size: $(wc -c < $WORKER) bytes"
          sed -i 's/L\.trustHost??(L\.trustHost=!1)/L.trustHost??(L.trustHost=!0)/g' $WORKER
          PATCHED=$(grep -c "trustHost=!0" $WORKER 2>/dev/null || echo "0")
          echo "trustHost=!0 件数: $PATCHED"

      - name: Commit build artifacts for gsk deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # .open-next を一時的に force-add（.gitignore を無視）
          git add -f .open-next/
          git commit -m "ci: add build artifacts for gsk deploy [skip ci]" || echo "No changes to commit"

      - name: Install gsk CLI
        run: npm install -g @genspark/cli@1.0.23

      - name: Deploy via gsk hosted deploy
        id: gsk_deploy
        run: |
          OUTPUT=$(gsk hosted deploy \
            --project-id ${{ secrets.GSK_PROJECT_ID }} \
            --api-key ${{ secrets.GSK_API_KEY }} \
            --output text 2>&1)
          echo "$OUTPUT"
          PENDING_ID=$(echo "$OUTPUT" | grep -oP 'pending_action_id:\s*\K[0-9a-f-]+' | head -1)
          if [ -n "$PENDING_ID" ]; then
            echo "pending_action_id=$PENDING_ID" >> $GITHUB_OUTPUT
            echo "::notice::pending_action_id=$PENDING_ID — sandbox で action_wait を実行してください"
          fi
        env:
          GSK_API_KEY: ${{ secrets.GSK_API_KEY }}
          GSK_PROJECT_ID: ${{ secrets.GSK_PROJECT_ID }}

      - name: Wait for deployment approval (action_wait)
        if: steps.gsk_deploy.outputs.pending_action_id != ''
        run: |
          PENDING_ID="${{ steps.gsk_deploy.outputs.pending_action_id }}"
          echo "::notice::pending_action_id=$PENDING_ID — UI で承認後、自動的に完了を待機します"
          for attempt in 1 2 3; do
            echo "=== action_wait attempt $attempt/3 ==="
            RESULT=$(gsk hosted action_wait \
              --id "$PENDING_ID" \
              --project-id ${{ secrets.GSK_PROJECT_ID }} \
              --api-key ${{ secrets.GSK_API_KEY }} \
              --output text 2>&1)
            echo "$RESULT"
            if echo "$RESULT" | grep -q "code: ok"; then
              echo "✅ デプロイ成功"
              break
            elif echo "$RESULT" | grep -q "code: still_pending"; then
              echo "⏳ まだ承認待ち、再試行します..."
              sleep 10
            else
              echo "❌ デプロイ失敗またはキャンセル"
              exit 1
            fi
          done
        env:
          GSK_API_KEY: ${{ secrets.GSK_API_KEY }}
          GSK_PROJECT_ID: ${{ secrets.GSK_PROJECT_ID }}

      - name: Cleanup build artifacts from git
        if: always()
        run: |
          git rm -r --cached .open-next/ 2>/dev/null || true
          git commit -m "ci: remove build artifacts [skip ci]" || echo "No changes to commit"
          git push origin main || echo "Push skipped"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify deployment
        run: |
          BASE_URL="https://fd8844cf-cba3-4f18-9986-e52d20b548d5.vip.gensparksite.com"
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/api/clubs")
          echo "/api/clubs → HTTP $STATUS (期待: 401)"
          STATUS_MU=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"registrationType":"mu","meetingId":1,"name":"test"}' \
            "$BASE_URL/api/attendances")
          echo "POST /api/attendances (mu) → HTTP $STATUS_MU (期待: 200 or 400)"
          echo "🚀 デプロイ完了: $BASE_URL"
