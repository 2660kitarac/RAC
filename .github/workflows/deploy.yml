name: Build & Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: |
          NODE_OPTIONS='--max-old-space-size=6144' \
          NEXT_TURBOPACK=0 \
          NEXT_TELEMETRY_DISABLED=1 \
          npx next build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST: "true"

      - name: Build OpenNext for Cloudflare
        run: |
          NEXT_TELEMETRY_DISABLED=1 npx @opennextjs/cloudflare build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST: "true"

      - name: Apply trustHost patch
        run: |
          WORKER=".open-next/worker.js"
          sed -i 's/L\.trustHost??(L\.trustHost=!1)/L.trustHost??(L.trustHost=!0)/g' $WORKER
          PATCHED=$(grep -c "trustHost=!0" $WORKER 2>/dev/null || echo "0")
          echo "trustHost=!0 適用件数: $PATCHED"

      - name: Update wrangler config for dispatch namespace
        run: |
          cat > wrangler.jsonc << 'EOF'
          {
            "name": "fd8844cf-cba3-4f18-9986-e52d20b548d5",
            "main": ".open-next/bundled-worker.js",
            "no_bundle": true,
            "assets": {
              "directory": ".open-next/assets",
              "binding": "ASSETS"
            },
            "compatibility_date": "2025-06-01",
            "compatibility_flags": ["nodejs_compat"],
            "d1_databases": [
              {
                "binding": "DB",
                "database_name": "fd8844cf-cba3-4f18-9986-e52d20b548d5-db",
                "database_id": "ccae0cce-0ed8-4fc0-88f4-51c7bb99f0d7"
              }
            ]
          }
          EOF

      - name: Deploy to Cloudflare Workers for Platform
        run: |
          npx wrangler deploy \
            --dispatch-namespace user_website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Worker secrets
        run: |
          echo "${{ secrets.AUTH_SECRET }}" | npx wrangler secret put AUTH_SECRET \
            --name fd8844cf-cba3-4f18-9986-e52d20b548d5 \
            --dispatch-namespace user_website
          echo "true" | npx wrangler secret put AUTH_TRUST_HOST \
            --name fd8844cf-cba3-4f18-9986-e52d20b548d5 \
            --dispatch-namespace user_website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify deployment
        run: |
          BASE_URL="https://fd8844cf-cba3-4f18-9986-e52d20b548d5.vip.gensparksite.com"
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/api/clubs")
          echo "/api/clubs → HTTP $STATUS (期待: 401)"
          echo "🚀 デプロイ完了: $BASE_URL"
