name: Build & Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: |
          NODE_OPTIONS='--max-old-space-size=6144' \
          NEXT_TURBOPACK=0 \
          NEXT_TELEMETRY_DISABLED=1 \
          npx next build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST: "true"

      - name: Build OpenNext for Cloudflare
        run: |
          NEXT_TELEMETRY_DISABLED=1 npx @opennextjs/cloudflare build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST: "true"

      - name: Apply trustHost patch
        run: |
          WORKER=".open-next/worker.js"
          sed -i 's/L\.trustHost??(L\.trustHost=!1)/L.trustHost??(L.trustHost=!0)/g' $WORKER
          PATCHED=$(grep -c "trustHost=!0" $WORKER 2>/dev/null || echo "0")
          echo "trustHost=!0 件数: $PATCHED"

      - name: Install gsk CLI
        run: npm install -g @genspark/cli@1.0.23

      - name: Deploy via gsk hosted deploy
        run: |
          gsk hosted deploy \
            --project-id ${{ secrets.GSK_PROJECT_ID }} \
            --api-key ${{ secrets.GSK_API_KEY }} \
            --output text
        env:
          GSK_API_KEY: ${{ secrets.GSK_API_KEY }}
          GSK_PROJECT_ID: ${{ secrets.GSK_PROJECT_ID }}

      - name: Verify deployment
        run: |
          BASE_URL="https://fd8844cf-cba3-4f18-9986-e52d20b548d5.vip.gensparksite.com"
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/api/clubs")
          echo "/api/clubs → HTTP $STATUS (期待: 401)"
          echo "🚀 デプロイ完了: $BASE_URL"
