name: Build & Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: |
          NODE_OPTIONS='--max-old-space-size=6144' \
          NEXT_TURBOPACK=0 \
          NEXT_TELEMETRY_DISABLED=1 \
          npx next build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST: "true"

      - name: Build OpenNext for Cloudflare
        run: |
          NEXT_TELEMETRY_DISABLED=1 npx @opennextjs/cloudflare build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST: "true"

      - name: Pre-bundle worker with wrangler (solve gsk sweeper timeout)
        run: |
          # worker.js が存在する場合 bundled-worker.js にコピー（正規化）
          if [ -f ".open-next/worker.js" ] && [ ! -f ".open-next/bundled-worker.js" ]; then
            cp .open-next/worker.js .open-next/bundled-worker.js
            echo "Copied worker.js -> bundled-worker.js"
          fi
          echo "Entry point size: $(wc -c < .open-next/bundled-worker.js) bytes"

          # wrangler --dry-run でバンドル済み単一ファイルを生成
          # no_bundle:true を一時的に外してバンドルさせる
          mkdir -p .open-next/wrangler-dist
          # no_bundle を除いた一時 wrangler config を作成
          node -e "
            const fs = require('fs');
            const cfg = fs.readFileSync('wrangler.jsonc', 'utf8');
            // コメントを除去してJSONパース
            const json = JSON.parse(cfg.replace(/\/\/.*$/mg, '').replace(/\/\*[\s\S]*?\*\//g, ''));
            delete json.no_bundle;
            fs.writeFileSync('wrangler-bundle.json', JSON.stringify(json, null, 2));
            console.log('Created wrangler-bundle.json (no_bundle removed)');
          "
          cat wrangler-bundle.json

          # --dry-run でバンドル
          CLOUDFLARE_ACCOUNT_ID=dummy npx wrangler deploy \
            --config wrangler-bundle.json \
            --dry-run \
            --outdir .open-next/wrangler-dist \
            2>&1 || true

          # バンドル結果確認
          echo "--- wrangler-dist contents ---"
          ls -la .open-next/wrangler-dist/ 2>/dev/null || echo "(empty)"

          # バンドル済みファイルが生成されたか確認
          BUNDLED=$(ls .open-next/wrangler-dist/*.js 2>/dev/null | head -1 || echo "")
          if [ -n "$BUNDLED" ]; then
            BUNDLED_SIZE=$(wc -c < "$BUNDLED")
            echo "Bundled file: $BUNDLED ($BUNDLED_SIZE bytes)"
            if [ "$BUNDLED_SIZE" -gt 50000 ]; then
              cp "$BUNDLED" .open-next/bundled-worker.js
              echo "✅ Replaced bundled-worker.js with pre-bundled version ($BUNDLED_SIZE bytes)"
            else
              echo "⚠️  Bundled file too small ($BUNDLED_SIZE bytes), keeping original"
            fi
          else
            echo "⚠️  wrangler dry-run produced no .js output, keeping original entry point"
          fi
          rm -f wrangler-bundle.json

          # trustHost パッチ
          WORKER=".open-next/bundled-worker.js"
          echo "Final worker size: $(wc -c < $WORKER) bytes"
          sed -i 's/L\.trustHost??(L\.trustHost=!1)/L.trustHost??(L.trustHost=!0)/g' $WORKER
          PATCHED=$(grep -c "trustHost=!0" $WORKER 2>/dev/null || echo "0")
          echo "trustHost=!0 件数: $PATCHED"

      - name: Commit build artifacts for gsk deploy
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f .open-next/
          git commit -m "ci: add build artifacts for gsk deploy [skip ci]" || echo "No changes to commit"

      - name: Install gsk CLI
        run: npm install -g @genspark/cli@1.0.23

      - name: Deploy via gsk hosted deploy
        id: gsk_deploy
        run: |
          OUTPUT=$(gsk hosted deploy \
            --project-id ${{ secrets.GSK_PROJECT_ID }} \
            --api-key ${{ secrets.GSK_API_KEY }} \
            --output text 2>&1)
          echo "$OUTPUT"
          PENDING_ID=$(echo "$OUTPUT" | grep -oP 'pending_action_id:\s*\K[0-9a-f-]+' | head -1)
          if [ -n "$PENDING_ID" ]; then
            echo "pending_action_id=$PENDING_ID" >> $GITHUB_OUTPUT
            echo "::notice::pending_action_id=$PENDING_ID"
          fi
        env:
          GSK_API_KEY: ${{ secrets.GSK_API_KEY }}
          GSK_PROJECT_ID: ${{ secrets.GSK_PROJECT_ID }}

      - name: Wait for deployment approval (action_wait x3)
        if: steps.gsk_deploy.outputs.pending_action_id != ''
        run: |
          PENDING_ID="${{ steps.gsk_deploy.outputs.pending_action_id }}"
          for attempt in 1 2 3; do
            echo "=== action_wait attempt $attempt/3 ==="
            RESULT=$(gsk hosted action_wait \
              --id "$PENDING_ID" \
              --project-id ${{ secrets.GSK_PROJECT_ID }} \
              --api-key ${{ secrets.GSK_API_KEY }} \
              --output text 2>&1)
            echo "$RESULT"
            if echo "$RESULT" | grep -q "code: ok"; then
              echo "✅ デプロイ成功"
              break
            elif echo "$RESULT" | grep -qE "code: still_pending|still_pending"; then
              echo "⏳ 承認待ち中..."
              sleep 5
            else
              echo "❌ デプロイ失敗"
              exit 1
            fi
          done
        env:
          GSK_API_KEY: ${{ secrets.GSK_API_KEY }}
          GSK_PROJECT_ID: ${{ secrets.GSK_PROJECT_ID }}

      - name: Cleanup build artifacts from git
        if: always()
        run: |
          git rm -r --cached .open-next/ 2>/dev/null || true
          git commit -m "ci: remove build artifacts [skip ci]" || echo "nothing to clean"
          git push origin main || echo "push skipped"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify deployment
        run: |
          BASE_URL="https://fd8844cf-cba3-4f18-9986-e52d20b548d5.vip.gensparksite.com"
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BASE_URL/api/clubs")
          echo "/api/clubs → HTTP $STATUS (期待: 401)"
          echo "🚀 Deploy URL: $BASE_URL"
